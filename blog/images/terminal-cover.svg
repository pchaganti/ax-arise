<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <style>
    text { font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace; }
    .prompt { fill: #64748b; font-size: 14px; }
    .cmd { fill: #e2e8f0; font-size: 14px; }
    .fail { fill: #ef4444; font-size: 14px; }
    .ok { fill: #10b981; font-size: 14px; }
    .dim { fill: #475569; font-size: 14px; }
    .amber { fill: #fbbf24; font-size: 14px; }
    .blue { fill: #60a5fa; font-size: 14px; }
    .white { fill: #f1f5f9; font-size: 14px; }
    .bold { font-weight: 700; }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c0c0c"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Terminal window chrome -->
  <rect x="60" y="30" width="1080" height="570" rx="12" fill="#1c1c1e" stroke="#333" stroke-width="1"/>

  <!-- Title bar -->
  <rect x="60" y="30" width="1080" height="40" rx="12" fill="#2a2a2c"/>
  <rect x="60" y="58" width="1080" height="12" fill="#2a2a2c"/>

  <!-- Traffic lights -->
  <circle cx="90" cy="50" r="7" fill="#ff5f57"/>
  <circle cx="112" cy="50" r="7" fill="#febc2e"/>
  <circle cx="134" cy="50" r="7" fill="#28c840"/>

  <!-- Title bar text -->
  <text x="600" y="55" text-anchor="middle" font-size="13" fill="#808080" font-family="-apple-system, sans-serif">arise train — email-agent</text>

  <!-- Terminal content -->
  <g transform="translate(90, 100)">
    <!-- Command -->
    <text x="0" y="0" class="prompt">$</text>
    <text x="20" y="0" class="cmd">python agent.py --episodes 10</text>

    <text x="0" y="30" class="dim">=== ARISE Email Agent Demo ===</text>
    <text x="0" y="50" class="dim">Starting with 0 tools</text>

    <!-- Episodes -->
    <text x="0" y="85" class="dim">[ARISE]</text>
    <text x="60" y="85" class="white">Episode 1</text>
    <text x="160" y="85" class="dim">|</text>
    <text x="175" y="85" class="fail bold">FAIL</text>
    <text x="225" y="85" class="dim">| reward=0.00 | skills=0</text>

    <text x="0" y="110" class="dim">[ARISE]</text>
    <text x="60" y="110" class="white">Episode 2</text>
    <text x="160" y="110" class="dim">|</text>
    <text x="175" y="110" class="fail bold">FAIL</text>
    <text x="225" y="110" class="dim">| reward=0.00 | skills=0</text>

    <text x="0" y="135" class="dim">[ARISE]</text>
    <text x="60" y="135" class="white">Episode 3</text>
    <text x="160" y="135" class="dim">|</text>
    <text x="175" y="135" class="fail bold">FAIL</text>
    <text x="225" y="135" class="dim">| reward=0.30 | skills=0</text>

    <text x="0" y="160" class="dim">[ARISE]</text>
    <text x="60" y="160" class="white">Episode 4</text>
    <text x="160" y="160" class="dim">|</text>
    <text x="175" y="160" class="ok bold">OK  </text>
    <text x="225" y="160" class="dim">| reward=1.00 | skills=0</text>

    <text x="0" y="185" class="dim">[ARISE]</text>
    <text x="60" y="185" class="white">Episode 5</text>
    <text x="160" y="185" class="dim">|</text>
    <text x="175" y="185" class="fail bold">FAIL</text>
    <text x="225" y="185" class="dim">| reward=0.00 | skills=0</text>

    <!-- Evolution trigger -->
    <text x="0" y="220" class="amber bold">[ARISE] Evolution triggered — analyzing gaps...</text>
    <text x="0" y="245" class="amber">[ARISE:forge] Detecting capability gaps...</text>
    <text x="0" y="270" class="amber">[ARISE] Found 1 capability gap.</text>
    <text x="0" y="295" class="amber">[ARISE:forge] Synthesizing 'read_emails_imap'...</text>
    <text x="0" y="320" class="ok">[ARISE:forge] All 7 tests passed!</text>
    <text x="0" y="345" class="blue">[ARISE:forge] Adversarial testing 'read_emails_imap'...</text>
    <text x="0" y="370" class="ok bold">[ARISE] Skill 'read_emails_imap' created and promoted!</text>

    <!-- Post-evolution -->
    <text x="0" y="405" class="dim">[ARISE]</text>
    <text x="60" y="405" class="white">Episode 8</text>
    <text x="160" y="405" class="dim">|</text>
    <text x="175" y="405" class="ok bold">OK  </text>
    <text x="225" y="405" class="dim">| reward=1.00 | skills=1  </text>
    <text x="470" y="405" class="ok">Real emails, real action items</text>

    <text x="0" y="430" class="dim">[ARISE]</text>
    <text x="60" y="430" class="white">Episode 9</text>
    <text x="160" y="430" class="dim">|</text>
    <text x="175" y="430" class="ok bold">OK  </text>
    <text x="225" y="430" class="dim">| reward=1.00 | skills=1</text>

    <!-- Final stats -->
    <text x="0" y="465" class="white bold">Final tools: 1</text>
    <text x="0" y="490" class="ok">  - read_emails_imap (success: 100%, used 3x)</text>
  </g>
</svg>
