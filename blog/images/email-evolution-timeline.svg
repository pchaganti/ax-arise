<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" fill="none">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .label { font-size: 12px; fill: #e2e8f0; font-weight: 500; }
    .ep { font-size: 11px; fill: #94a3b8; font-weight: 600; }
    .tiny { font-size: 10px; fill: #64748b; }
    .score { font-size: 10px; font-weight: 700; }
  </style>
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="900" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" rx="16" fill="url(#bg3)"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="16" fill="#e2e8f0" font-weight="700" font-family="-apple-system, sans-serif">Evolution Timeline: Email Agent</text>

  <!-- Timeline line -->
  <line x1="50" y1="160" x2="850" y2="160" stroke="#334155" stroke-width="2"/>

  <!-- Episodes -->
  <!-- Ep 1 - FAIL -->
  <circle cx="100" cy="160" r="16" fill="#dc2626" opacity="0.8"/>
  <text x="100" y="164" text-anchor="middle" class="score" fill="#fff">0.0</text>
  <text x="100" y="135" text-anchor="middle" class="ep">Ep 1</text>
  <text x="100" y="195" text-anchor="middle" class="tiny">FAIL</text>
  <text x="100" y="208" text-anchor="middle" class="tiny">0 tools</text>

  <!-- Ep 2 - FAIL -->
  <circle cx="180" cy="160" r="16" fill="#dc2626" opacity="0.6"/>
  <text x="180" y="164" text-anchor="middle" class="score" fill="#fff">0.3</text>
  <text x="180" y="135" text-anchor="middle" class="ep">Ep 2</text>
  <text x="180" y="195" text-anchor="middle" class="tiny">FAIL</text>

  <!-- Ep 3 - OK (hallucinated) -->
  <circle cx="260" cy="160" r="16" fill="#059669" opacity="0.5"/>
  <text x="260" y="164" text-anchor="middle" class="score" fill="#fff">1.0</text>
  <text x="260" y="135" text-anchor="middle" class="ep">Ep 3</text>
  <text x="260" y="195" text-anchor="middle" class="tiny">OK*</text>
  <text x="260" y="208" text-anchor="middle" class="tiny">*hallucinated</text>

  <!-- Ep 4 - OK -->
  <circle cx="340" cy="160" r="16" fill="#059669" opacity="0.5"/>
  <text x="340" y="164" text-anchor="middle" class="score" fill="#fff">1.0</text>
  <text x="340" y="135" text-anchor="middle" class="ep">Ep 4</text>

  <!-- Ep 5 - FAIL -->
  <circle cx="420" cy="160" r="16" fill="#dc2626" opacity="0.6"/>
  <text x="420" y="164" text-anchor="middle" class="score" fill="#fff">0.3</text>
  <text x="420" y="135" text-anchor="middle" class="ep">Ep 5</text>
  <text x="420" y="195" text-anchor="middle" class="tiny">FAIL</text>

  <!-- Ep 6 - OK -->
  <circle cx="500" cy="160" r="16" fill="#059669" opacity="0.5"/>
  <text x="500" y="164" text-anchor="middle" class="score" fill="#fff">1.0</text>
  <text x="500" y="135" text-anchor="middle" class="ep">Ep 6</text>

  <!-- Ep 7 - FAIL → triggers evolution -->
  <circle cx="580" cy="160" r="16" fill="#dc2626" opacity="0.9"/>
  <text x="580" y="164" text-anchor="middle" class="score" fill="#fff">0.0</text>
  <text x="580" y="135" text-anchor="middle" class="ep">Ep 7</text>
  <text x="580" y="195" text-anchor="middle" class="tiny">FAIL</text>

  <!-- Evolution marker -->
  <rect x="610" y="80" width="120" height="55" rx="8" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="670" y="100" text-anchor="middle" class="label" fill="#f59e0b">EVOLUTION</text>
  <text x="670" y="116" text-anchor="middle" class="tiny" fill="#f59e0b">synthesize tool</text>
  <text x="670" y="128" text-anchor="middle" class="tiny" fill="#f59e0b">7/7 tests pass</text>
  <path d="M 610 120 L 588 155" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- Arrow down from evolution -->
  <line x1="670" y1="135" x2="670" y2="148" stroke="#f59e0b" stroke-width="1.5"/>
  <polygon points="670,155 664,148 676,148" fill="#f59e0b"/>

  <!-- Promoted tool indicator -->
  <rect x="630" y="155" width="80" height="20" rx="4" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="1"/>
  <text x="670" y="169" text-anchor="middle" font-size="9" fill="#10b981" font-family="-apple-system, sans-serif" font-weight="600">+1 TOOL</text>

  <!-- Ep 8 - FAIL (learning) -->
  <circle cx="700" cy="160" r="16" fill="#dc2626" opacity="0.4"/>
  <text x="700" y="164" text-anchor="middle" class="score" fill="#fff">0.3</text>
  <text x="700" y="135" text-anchor="middle" class="ep">Ep 8</text>
  <text x="700" y="195" text-anchor="middle" class="tiny">1 tool</text>

  <!-- Ep 9 - OK with real data -->
  <circle cx="780" cy="160" r="18" fill="#059669" opacity="0.9"/>
  <text x="780" y="164" text-anchor="middle" class="score" fill="#fff">1.0</text>
  <text x="780" y="135" text-anchor="middle" class="ep">Ep 9</text>
  <text x="780" y="195" text-anchor="middle" class="tiny">OK</text>
  <text x="780" y="208" text-anchor="middle" class="tiny">real emails!</text>

  <!-- Ep 10 - OK -->
  <circle cx="840" cy="160" r="18" fill="#059669" opacity="0.9"/>
  <text x="840" y="164" text-anchor="middle" class="score" fill="#fff">1.0</text>
  <text x="840" y="135" text-anchor="middle" class="ep">Ep 10</text>
  <text x="840" y="195" text-anchor="middle" class="tiny">OK</text>

  <!-- Phase labels -->
  <rect x="50" y="240" width="200" height="25" rx="6" fill="#dc2626" opacity="0.1" stroke="#dc2626" stroke-width="1"/>
  <text x="150" y="257" text-anchor="middle" font-size="11" fill="#ef4444" font-family="-apple-system, sans-serif">No tools — agent guessing</text>

  <rect x="640" y="240" width="220" height="25" rx="6" fill="#059669" opacity="0.1" stroke="#059669" stroke-width="1"/>
  <text x="750" y="257" text-anchor="middle" font-size="11" fill="#10b981" font-family="-apple-system, sans-serif">Evolved tool — reading real emails</text>
</svg>
