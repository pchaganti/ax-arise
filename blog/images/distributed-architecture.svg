<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" fill="none">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .label { font-size: 14px; fill: #e2e8f0; font-weight: 600; }
    .sublabel { font-size: 11px; fill: #94a3b8; }
    .tiny { font-size: 10px; fill: #64748b; }
    .service { font-size: 12px; fill: #cbd5e1; font-weight: 500; }
  </style>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="900" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#10b981"/>
    </marker>
    <marker id="arr-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="400" rx="16" fill="url(#bg2)"/>

  <!-- Agent Process box -->
  <rect x="40" y="40" width="340" height="200" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="60" y="70" class="label">Agent Process</text>
  <text x="60" y="88" class="tiny">Amazon Bedrock AgentCore</text>

  <!-- Inside agent -->
  <rect x="60" y="105" width="140" height="50" rx="8" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1"/>
  <text x="130" y="135" text-anchor="middle" class="service">Strands Agent</text>

  <rect x="220" y="105" width="140" height="50" rx="8" fill="#6366f1" opacity="0.2" stroke="#6366f1" stroke-width="1"/>
  <text x="290" y="128" text-anchor="middle" class="service">ARISE</text>
  <text x="290" y="143" text-anchor="middle" class="tiny">read skills, report trajs</text>

  <rect x="60" y="175" width="300" height="45" rx="8" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="210" y="200" text-anchor="middle" class="service">read_emails_imap (evolved tool)</text>

  <!-- Arrow agent → ARISE -->
  <line x1="200" y1="130" x2="218" y2="130" stroke="#475569" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- S3 -->
  <rect x="440" y="60" width="160" height="80" rx="12" fill="#0f172a" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="520" y="95" text-anchor="middle" class="label">S3</text>
  <text x="520" y="115" text-anchor="middle" class="tiny">Skill Store</text>

  <!-- SQS -->
  <rect x="440" y="180" width="160" height="80" rx="12" fill="#0f172a" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="520" y="215" text-anchor="middle" class="label">SQS</text>
  <text x="520" y="235" text-anchor="middle" class="tiny">Trajectory Queue</text>

  <!-- Worker box -->
  <rect x="660" y="40" width="210" height="200" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="680" y="70" class="label">ARISE Worker</text>
  <text x="680" y="88" class="tiny">AWS Lambda</text>

  <rect x="680" y="105" width="170" height="40" rx="8" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1"/>
  <text x="765" y="130" text-anchor="middle" class="service">Detect gaps</text>

  <rect x="680" y="155" width="170" height="40" rx="8" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1"/>
  <text x="765" y="180" text-anchor="middle" class="service">Synthesize + test</text>

  <rect x="680" y="205" width="170" height="25" rx="6" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1"/>
  <text x="765" y="222" text-anchor="middle" class="service">Promote</text>

  <!-- Arrows -->
  <!-- Agent reads from S3 -->
  <path d="M 360 100 L 438 100" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr-amber)"/>
  <text x="399" y="92" text-anchor="middle" class="tiny">read skills</text>

  <!-- Agent reports to SQS -->
  <path d="M 360 200 L 438 215" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="390" y="218" text-anchor="middle" class="tiny">report</text>

  <!-- SQS → Worker -->
  <path d="M 600 220 L 658 175" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr-blue)"/>
  <text x="638" y="210" text-anchor="middle" class="tiny">trigger</text>

  <!-- Worker → S3 -->
  <path d="M 680 222 Q 620 280 600 140 Q 600 100 600 100" stroke="#10b981" stroke-width="2" marker-end="url(#arr-green)"/>
  <text x="640" y="280" text-anchor="middle" class="tiny">promote skills</text>

  <!-- User -->
  <rect x="40" y="290" width="340" height="70" rx="12" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="210" y="325" text-anchor="middle" class="label">You</text>
  <text x="210" y="345" text-anchor="middle" class="sublabel">agentcore invoke "Read my emails..."</text>

  <!-- User → Agent -->
  <path d="M 210 290 L 210 242" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="232" y="272" class="tiny">A2A</text>

  <!-- Timeline note -->
  <rect x="440" y="300" width="430" height="60" rx="10" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="655" y="325" text-anchor="middle" class="sublabel">New tools appear within 30 seconds — no restarts, no deploys</text>
  <text x="655" y="345" text-anchor="middle" class="tiny">Agent picks up evolved skills from S3 on next request</text>
</svg>
