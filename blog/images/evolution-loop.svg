<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" fill="none">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .label { font-size: 13px; fill: #f1f5f9; font-weight: 500; }
    .sublabel { font-size: 10px; fill: #cbd5e1; }
    .step-num { font-size: 11px; fill: #ffffff; font-weight: 700; }
    .sublabel-dark { font-size: 10px; fill: #1e293b; font-weight: 500; }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="active" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="success" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="fail" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="evolve" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" rx="16" fill="url(#bg)"/>

  <!-- Step 1: Agent runs task -->
  <rect x="30" y="110" width="130" height="100" rx="12" fill="url(#active)" opacity="0.9"/>
  <circle cx="55" cy="130" r="11" fill="rgba(0,0,0,0.35)"/>
  <text x="55" y="134" text-anchor="middle" class="step-num">1</text>
  <text x="95" y="150" text-anchor="middle" class="label">Agent runs</text>
  <text x="95" y="168" text-anchor="middle" class="label">task</text>
  <text x="95" y="192" text-anchor="middle" font-size="10" fill="#c7d2fe" font-family="-apple-system, sans-serif">with current tools</text>

  <!-- Arrow 1→2 -->
  <line x1="160" y1="160" x2="195" y2="160" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: Score -->
  <rect x="200" y="110" width="130" height="100" rx="12" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <circle cx="225" cy="130" r="11" fill="url(#active)" opacity="0.8"/>
  <text x="225" y="134" text-anchor="middle" class="step-num">2</text>
  <text x="265" y="150" text-anchor="middle" class="label">Reward</text>
  <text x="265" y="168" text-anchor="middle" class="label">function</text>
  <text x="265" y="192" text-anchor="middle" class="sublabel">scores 0.0 – 1.0</text>

  <!-- Arrow success (up) -->
  <path d="M 295 110 Q 295 60 370 60" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <rect x="370" y="40" width="100" height="40" rx="8" fill="url(#success)"/>
  <text x="420" y="65" text-anchor="middle" class="label">Success</text>

  <!-- Arrow back from success to step 1 -->
  <path d="M 420 40 Q 420 15 95 15 Q 30 15 30 110" stroke="#34d399" stroke-width="1.5" fill="none" stroke-dasharray="6 3" marker-end="url(#arrow)"/>
  <text x="250" y="12" text-anchor="middle" class="sublabel">log trajectory, continue</text>

  <!-- Arrow fail (down) -->
  <path d="M 295 210 Q 295 260 370 260" stroke="#f87171" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <rect x="370" y="240" width="100" height="40" rx="8" fill="url(#fail)"/>
  <text x="420" y="265" text-anchor="middle" class="label">Failure</text>

  <!-- Arrow fail → detect (continuous path) -->
  <path d="M 470 260 L 580 260 L 580 212" stroke="#f87171" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="525" y="253" class="sublabel">enough failures</text>

  <!-- Step 3: Detect gaps -->
  <rect x="515" y="110" width="130" height="100" rx="12" fill="url(#evolve)"/>
  <circle cx="540" cy="130" r="11" fill="rgba(0,0,0,0.35)"/>
  <text x="540" y="134" text-anchor="middle" class="step-num">3</text>
  <text x="580" y="150" text-anchor="middle" class="sublabel-dark">Detect</text>
  <text x="580" y="168" text-anchor="middle" class="sublabel-dark">gaps</text>
  <text x="580" y="192" text-anchor="middle" font-size="10" fill="#451a03" font-family="-apple-system, sans-serif">LLM analyzes failures</text>

  <!-- Arrow 3→4 -->
  <line x1="645" y1="160" x2="680" y2="160" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 4: Synthesize -->
  <rect x="685" y="110" width="130" height="100" rx="12" fill="url(#evolve)"/>
  <circle cx="710" cy="130" r="11" fill="rgba(0,0,0,0.35)"/>
  <text x="710" y="134" text-anchor="middle" class="step-num">4</text>
  <text x="750" y="150" text-anchor="middle" class="sublabel-dark">Synthesize</text>
  <text x="750" y="168" text-anchor="middle" class="sublabel-dark">+ test</text>
  <text x="750" y="192" text-anchor="middle" font-size="10" fill="#451a03" font-family="-apple-system, sans-serif">sandbox + adversarial</text>

  <!-- Arrow 4→promote -->
  <path d="M 815 140 Q 860 140 860 80 Q 860 60 820 60" stroke="#34d399" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <rect x="690" y="40" width="130" height="40" rx="8" fill="url(#success)"/>
  <text x="755" y="65" text-anchor="middle" class="label">Promote tool</text>

  <!-- Arrow promote → back to step 1 -->
  <path d="M 690 55 Q 500 55 95 55 Q 30 55 30 110" stroke="#34d399" stroke-width="2" fill="none" stroke-dasharray="6 3" marker-end="url(#arrow)"/>
  <text x="400" y="48" text-anchor="middle" class="sublabel">new tool available on next run</text>
</svg>
